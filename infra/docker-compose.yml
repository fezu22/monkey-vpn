version: '3.9'

# Local development stack:
#   - backend: Go API on :8080
#   - web:     Vite dev server on :5173
#
# The mobile app is run separately via `npm run android` / `run-ios` from /mobile.

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: monkey-vpn-backend
    container_name: monkey-vpn-backend
    environment:
      APP_ENV: development
      PORT: '8080'
      DB_PATH: /data/monkey.db
      JWT_SECRET: dev-secret-change-me
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - '8080:8080'
    volumes:
      - monkey-data:/data
    restart: unless-stopped

  web:
    image: node:22-alpine
    container_name: monkey-vpn-web
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - '5173:5173'
    volumes:
      - ../web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  monkey-data:
  web-node-modules:
